name: uptime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a test Telegram alert"
        required: false
        default: "false"

permissions: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe endpoints
        id: probe
        run: |
          set -u
          FAILS=""
          check () {
            local name="$1" url="$2" want="$3"
            local code body
            body=$(curl -sS -m 20 -w "\n%{http_code}" "$url" 2>/dev/null) || { FAILS="$FAILS\n$name: curl error"; return; }
            code=$(echo "$body" | tail -1)
            if [ "$code" != "200" ]; then
              FAILS="$FAILS\n$name: HTTP $code"
              return
            fi
            if [ -n "$want" ] && ! echo "$body" | head -n -1 | grep -q "$want"; then
              FAILS="$FAILS\n$name: 200 but body missing '$want'"
            fi
          }
          check "api-health" "https://dank-frens-api.onrender.com/api/health" '"ok":true'
          # The genesis collection pubkey only exists in the mainnet DB, so this
          # doubles as a mainnet-regression guard: if the backend ever boots
          # against the old devnet DB, this marker disappears and we alert.
          check "market-feed-mainnet" "https://dank-frens-api.onrender.com/api/dank-frens/market-feed" "7GJq37Y5yRXU2g7deArKAfdq2Pcs7bwauWfjdFKD7aF6"
          check "frontend" "https://dankfrens.com" ""
          # On-chain probe: mainnet program must exist and be executable.
          # Public RPC can throttle shared runners, so transport errors are
          # skipped; we only alert when RPC answers and the program is wrong.
          rpc=$(curl -sS -m 20 -X POST -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getAccountInfo","params":["HTVDGm5rVydzGDyoTfZU2C8u3GL6Px6idsXvnMzyNtrJ",{"encoding":"base64","dataSlice":{"offset":0,"length":0}}]}' \
            "https://api.mainnet-beta.solana.com" 2>/dev/null) || rpc=""
          if [ -n "$rpc" ] && echo "$rpc" | grep -q '"result"'; then
            if ! echo "$rpc" | grep -q '"executable":true'; then
              FAILS="$FAILS\nonchain-program: mainnet program missing or not executable"
            fi
          fi
          if [ "${{ github.event.inputs.test_alert }}" = "true" ]; then
            FAILS="$FAILS\n(test alert requested manually)"
          fi
          if [ -n "$FAILS" ]; then
            echo "fails<<EOF" >> "$GITHUB_OUTPUT"
            printf "%b\n" "$FAILS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "status=down" >> "$GITHUB_OUTPUT"
          else
            echo "status=up" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram alert on failure
        if: steps.probe.outputs.status == 'down'
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TG_CHAT_ID }}
          FAILS: ${{ steps.probe.outputs.fails }}
        run: |
          TEXT=$(printf '[Dank Frens 감시] 문제 감지됨:%b\n확인: dashboard.render.com / vercel.com\n시각(UTC): %s' "$FAILS" "$(date -u '+%Y-%m-%d %H:%M')")
          curl -sS -m 20 -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${TEXT}" > /dev/null

      - name: Fail job when down
        if: steps.probe.outputs.status == 'down'
        run: exit 1
